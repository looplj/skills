name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test (root module)
        run: go test ./...

      - name: Test (skillscmd module)
        run: cd skillscmd && go test ./...

      - name: Test (find-skills module)
        run: cd cmd/find-skills && go test ./...
